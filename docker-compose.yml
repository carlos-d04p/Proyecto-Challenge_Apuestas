version: '3.8'

services:
  web:
    build: .
    # El comando por defecto cuando levantemos el servidor
    command: python manage.py runserver 0.0.0.0:8003
    volumes:
      - .:/app  # Sincroniza tu código local con el contenedor
    ports:
      - "8003:8003"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=fairbet
      - POSTGRES_USER=fairbet
      - POSTGRES_PASSWORD=fairbet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
