openapi: 3.0.0
info:
  title: OPS Console & Casa de Apuestas API
  description: Documentación de la API del Core de Apuestas y Billetera (Partida Doble)
  version: 1.0.0

servers:
  - url: http://localhost:8003
    description: Servidor de Desarrollo Local

paths:
  /api/markets/events/:
    get:
      summary: Lista de eventos
      description: Retorna los eventos programados y en vivo, junto con sus mercados.
      responses:
        '200':
          description: OK

  /api/betting/bets/:
    post:
      summary: Colocar una apuesta
      description: Coloca una apuesta en una selección de un mercado. Deduzca los fondos de la billetera automáticamente vía partida doble.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selection_id:
                  type: string
                  format: uuid
                wager:
                  type: number
                  format: float
      responses:
        '201':
          description: Apuesta creada exitosamente
        '400':
          description: Fondos insuficientes o cuotas inválidas

  /api/betting/bets/{id}/cashout/:
    post:
      summary: Cash-Out Anticipado
      description: Liquida la apuesta anticipadamente devolviendo un monto parcial a la billetera.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cash-Out procesado con éxito
        '400':
          description: La apuesta ya no está pendiente o el evento terminó

  /api/wallet/balance/:
    get:
      summary: Obtener el balance del usuario
      description: Calcula el balance actual en tiempo real basado en el ledger de partida doble.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: string
                    description: "Ejemplo: 150.0000"
                  currency:
                    type: string
                    example: "PEN"

  /api/wallet/deposits/:
    post:
      summary: Simular Depósito
      description: Crea un depósito hacia el USER_WALLET. Implementa idempotencia.
      responses:
        '201':
          description: Depósito creado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
