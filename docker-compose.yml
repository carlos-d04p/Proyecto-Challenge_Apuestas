version: '3.8'

services:
  web:
    build: .
    # El comando por defecto cuando levantemos el servidor
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app  # Sincroniza tu código local con el contenedor
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - EMAIL_HOST=mailpit
    depends_on:
      - db
      - redis
      - mailpit

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - EMAIL_HOST=mailpit
    depends_on:
      - redis
      - db
      - mailpit

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=fairbet
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: